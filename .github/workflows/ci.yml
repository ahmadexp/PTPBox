name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: UI, agent, and host bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and test
        run: npm test

      - name: Build standalone host bundle
        run: npm run build:standalone

      - name: Validate Python
        run: |
          python3 -m py_compile agent/ptpbox_agent.py scripts/ptpboxctl.py
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Validate shell
        run: bash -n scripts/install-host.sh scripts/uninstall-host.sh

      - name: Validate topology JSON
        run: python3 -m json.tool agent/topology.json >/dev/null
